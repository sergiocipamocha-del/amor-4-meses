body {
    margin: 0;

    overflow: hidden;
}


h1 {
    color: white;
    margin-top: 30px;
    animation: fadeIn 2s;

p {
    color: white;
    font-size: 1.2em;
    margin: 20px;
    animation: fadeIn 3s;
}


.slider {
    width: 300px;
    height: 400px;
    margin: auto;
    overflow: hidden;
    border-radius: 20px;
}

.slides {
    display: flex;
    width: 300%;
    animation: slide 12s infinite;
}

.slides img {
    width: 300px;
    height: 400px;
    object-fit: cover;
}

@keyframes slide {
    0% {margin-left: 0;}
    33% {margin-left: 0;}
    36% {margin-left: -300px;}
    66% {margin-left: -300px;}
    69% {margin-left: -600px;}
    100% {margin-left: -600px;}
}

button {
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: #ff4d6d;
    color: white;
    font-size: 1.1em;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}


.heart {
    position: absolute;
    color: red;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh); opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}


.flower {
    position: absolute;
    font-size: 20px;
    animation: fall 8s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(100vh);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
